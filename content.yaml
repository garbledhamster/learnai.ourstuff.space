  structured-outputs:
    title: "Structured Outputs"
    level: "Builder / practical"
    summary: "Structured outputs make AI return data in predictable formats like JSON so software can use the result reliably."
    why: "This is one of the first differences between a demo and a useful app."
    goal: "See why output format matters."
    terms:
