# Learn AI content
# Edit this file to change lessons, topics, people, books, and source labels.
official:
  googleML: "https://developers.google.com/machine-learning/crash-course"
  googleLLM: "https://developers.google.com/machine-learning/resources/intro-llms"
  awsAI: "https://aws.amazon.com/certification/certified-ai-practitioner/"
  microsoftAI: "https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-fundamentals/"
  nistRMF: "https://www.nist.gov/itl/ai-risk-management-framework"
  openaiDocs: "https://platform.openai.com/docs"
  microsoftCopilot: "https://learn.microsoft.com/en-us/copilot/"
  owaspLLM: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
  mitreAtlas: "https://atlas.mitre.org/"
  googleGlossary: "https://developers.google.com/machine-learning/glossary"
paths:
  - id: "beginner"
    label: "BEGINNER"
    title: "Start From Nothing"
    summary: "Plain-language route into AI, ML, LLMs, prompting, and basic caution."
    topics:
      - "what-is-ai"
      - "machine-learning"
      - "generative-ai"
      - "llms"
      - "prompting"
      - "hallucinations"
  - id: "work"
    label: "WORK"
    title: "Use AI At Work"
    summary: "Workflows, writing, research, automation judgment, and responsible workplace use."
    topics:
      - "ai-workflows"
      - "prompting-for-work"
      - "research-with-ai"
      - "writing-with-ai"
      - "automation-vs-ai"
      - "responsible-use"
  - id: "it"
    label: "IT / ADMIN"
    title: "AI For IT People"
    summary: "Copilot, privacy, identity, logging, governance, and internal knowledge systems."
    topics:
      - "microsoft-copilot"
      - "data-privacy"
      - "identity-access"
      - "logging-audit"
      - "ai-governance"
      - "internal-knowledge"
  - id: "builder"
    label: "BUILDER"
    title: "Build With AI"
    summary: "APIs, structured outputs, embeddings, vector databases, RAG, and agents."
    topics:
      - "apis"
      - "structured-outputs"
      - "embeddings"
      - "vector-databases"
      - "rag"
      - "agents"
  - id: "cert"
    label: "CERTS"
    title: "Maybe Get Certified"
    summary: "Optional cert-aware route for AWS, Azure, responsible AI, and exam vocabulary."
    topics:
      - "aws-ai-practitioner"
      - "azure-ai-fundamentals"
      - "responsible-ai"
      - "foundation-models"
      - "cloud-ai-services"
      - "exam-terms"
topics:
  what-is-ai:
    title: "What is AI?"
    level: "Foundation / beginner"
    summary: "AI is software that performs tasks involving prediction, pattern recognition, language, planning, or judgment that used to feel like human-only work."
    why: "This gives the learner a mental anchor. Once AI stops sounding magical, later ideas like models, training, and inference become easier."
    goal: "Explain AI without hype in three sentences."
    terms:
      - "model"
      - "prediction"
      - "training"
      - "inference"
      - "automation"
    people: "foundations"
    books: "foundations"
    official: "https://developers.google.com/machine-learning/crash-course"
    officialLabel: "Google ML Crash Course"
    practice: "Write a three-sentence explanation of AI for a coworker who has never used ChatGPT. Include one example and one limit."
    steps:
      - "Define AI in plain language"
      - "Separate AI from normal automation"
      - "Find one real-world example"
      - "Write one thing AI is bad at"
      - "Save a definition note"
    query: "artificial intelligence explained for beginners"
  machine-learning:
    title: "Machine Learning"
    level: "Foundation / beginner"
    summary: "Machine learning is a way of building systems that learn patterns from data instead of being programmed with every rule manually."
    why: "Most modern AI is built on machine learning. This topic explains why data, examples, error, and prediction matter."
    goal: "Understand model training at a non-math level."
    terms:
      - "dataset"
      - "label"
      - "training"
      - "prediction"
      - "overfitting"
    people: "foundations"
    books: "foundations"
    official: "https://developers.google.com/machine-learning/crash-course"
    officialLabel: "Google ML Crash Course"
    practice: "Explain the difference between writing rules manually and training a model from examples."
    steps:
      - "Watch one beginner ML explanation"
      - "Read one official ML intro"
      - "Define dataset/training/prediction"
      - "Find an example from daily life"
      - "Save a confusion note"
    query: "machine learning explained beginner"
  generative-ai:
    title: "Generative AI"
    level: "Foundation / beginner"
    summary: "Generative AI creates new text, images, code, audio, or other content from patterns learned during training."
    why: "This is the AI category most people are encountering through ChatGPT, Claude, Gemini, Copilot, image tools, and coding assistants."
    goal: "Explain what makes generative AI different from older predictive AI."
    terms:
      - "generation"
      - "prompt"
      - "model"
      - "output"
      - "synthetic media"
    people: "llm"
    books: "llm"
    official: "https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-fundamentals/"
    officialLabel: "Microsoft Azure AI Fundamentals"
    practice: "List three things generative AI can create and one reason each output still needs human review."
    steps:
      - "Define generative AI"
      - "Compare it to predictive AI"
      - "Try one text example"
      - "Try one image/code example conceptually"
      - "Save a plain-English summary"
    query: "generative AI explained beginner"
  llms:
    title: "Large Language Models"
    level: "Foundation / beginner"
    summary: "Large language models are AI systems that generate language by predicting likely token sequences from patterns learned across large text datasets."
    why: "LLMs are the engine behind many current AI tools. Understanding them helps explain both their usefulness and their mistakes."
    goal: "Understand why LLMs sound intelligent but can still be wrong."
    terms:
      - "token"
      - "context window"
      - "prompt"
      - "completion"
      - "hallucination"
    people: "llm"
    books: "llm"
    official: "https://developers.google.com/machine-learning/resources/intro-llms"
    officialLabel: "Google Intro to LLMs"
    practice: "Explain why an LLM can write a confident answer and still be factually wrong."
    steps:
      - "Watch an LLM explainer"
      - "Read a beginner LLM source"
      - "Define token/context/prompt"
      - "Write a mistake example"
      - "Save a definition note"
    query: "large language models explained beginner"
  prompting:
    title: "Prompting"
    level: "Practical / beginner"
    summary: "Prompting is giving an AI tool instructions, context, examples, and constraints so the output is more useful."
    why: "Prompting is the first practical skill most learners can use immediately. It also teaches that AI output depends heavily on framing."
    goal: "Turn vague requests into useful instructions."
    terms:
      - "instruction"
      - "context"
      - "examples"
      - "constraints"
      - "role"
    people: "work"
    books: "work"
    official: "https://platform.openai.com/docs"
    officialLabel: "OpenAI Docs"
    practice: "Rewrite a vague prompt into a structured prompt with role, task, context, constraints, and output format."
    steps:
      - "Write a vague prompt"
      - "Add context"
      - "Add constraints"
      - "Ask for a format"
      - "Compare outputs"
      - "Save an example note"
    query: "prompt engineering basics for beginners"
  hallucinations:
    title: "Hallucinations"
    level: "Foundation / caution"
    summary: "A hallucination is when an AI system produces an answer that sounds plausible but is false, unsupported, or fabricated."
    why: "This is one of the first safety concepts learners need. It teaches them not to confuse fluency with truth."
    goal: "Know when to verify AI output."
    terms:
      - "verification"
      - "source grounding"
      - "confidence"
      - "fabrication"
      - "citation"
    people: "governance"
    books: "governance"
    official: "https://www.nist.gov/itl/ai-risk-management-framework"
    officialLabel: "NIST AI RMF"
    practice: "Ask an AI tool a factual question, then list what would need to be checked before trusting the answer."
    steps:
      - "Define hallucination"
      - "Find one example"
      - "Identify high-risk use cases"
      - "Learn verification habits"
      - "Save a caution note"
    query: "AI hallucinations explained beginner"
  ai-workflows:
    title: "AI Workflows"
    level: "Work / beginner"
    summary: "An AI workflow is a repeatable pattern where AI helps with part of a task, such as research, drafting, summarizing, coding, or decision support."
    why: "People get more value from repeatable workflows than one-off prompts. This topic turns AI from a toy into a work aid."
    goal: "Map one real task into steps where AI can help."
    terms:
      - "workflow"
      - "input"
      - "review"
      - "iteration"
      - "handoff"
    people: "work"
    books: "work"
    official: "https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-fundamentals/"
    officialLabel: "Microsoft AI Fundamentals"
    practice: "Choose one task from work and split it into: input, AI assist, human review, final output."
    steps:
      - "Pick one recurring task"
      - "Write the manual steps"
      - "Mark where AI could help"
      - "Mark where human review is required"
      - "Save a workflow note"
    query: "AI workflow examples office work"
  prompting-for-work:
    title: "Prompting For Work"
    level: "Work / practical"
    summary: "Prompting for work means giving AI enough task context to produce a useful draft, plan, summary, or analysis while keeping judgment with the human."
    why: "This is the bridge between casual AI use and practical office usefulness."
    goal: "Create repeatable prompt patterns."
    terms:
      - "role"
      - "task"
      - "context"
      - "tone"
      - "review"
    people: "work"
    books: "work"
    official: "https://platform.openai.com/docs"
    officialLabel: "OpenAI Docs"
    practice: "Build one reusable work prompt template for emails, summaries, tickets, or documentation."
    steps:
      - "Pick a work task"
      - "Add role and goal"
      - "Add context"
      - "Add output format"
      - "Add review rules"
      - "Save the template"
    query: "ChatGPT prompts for workplace productivity"
  research-with-ai:
    title: "Research With AI"
    level: "Work / practical"
    summary: "AI can help gather questions, summarize sources, compare ideas, and form search plans, but it should not replace source checking."
    why: "Research is one of the best uses of AI when the learner understands verification."
    goal: "Use AI to improve search without outsourcing judgment."
    terms:
      - "source"
      - "citation"
      - "summary"
      - "comparison"
      - "verification"
    people: "work"
    books: "work"
    official: "https://developers.google.com/machine-learning/glossary"
    officialLabel: "Google ML Glossary"
    practice: "Ask AI for a research plan, then verify every factual claim through original sources."
    steps:
      - "Start with a question"
      - "Ask for search terms"
      - "Find sources manually"
      - "Compare summaries"
      - "Save source notes"
    query: "how to use AI for research responsibly"
  writing-with-ai:
    title: "Writing With AI"
    level: "Work / practical"
    summary: "AI can help outline, draft, revise, and compress writing, but the user must still own the meaning, accuracy, and tone."
    why: "Writing is a common entry point where learners can see immediate value and risk."
    goal: "Use AI as editor, not ghostwriter."
    terms:
      - "outline"
      - "draft"
      - "revision"
      - "voice"
      - "accuracy"
    people: "work"
    books: "work"
    official: "https://platform.openai.com/docs"
    officialLabel: "OpenAI Docs"
    practice: "Write a short paragraph yourself, then ask AI to produce three revisions: clearer, shorter, and more formal."
    steps:
      - "Write your own draft"
      - "Ask for one type of revision"
      - "Check meaning"
      - "Reject bad changes"
      - "Save before/after note"
    query: "using AI to improve writing without losing voice"
  automation-vs-ai:
    title: "Automation vs AI"
    level: "Work / systems"
    summary: "Automation follows known rules. AI handles fuzzier tasks involving language, judgment, pattern recognition, or uncertain inputs."
    why: "This distinction prevents people from using AI where a normal script, workflow, or database rule would be better."
    goal: "Choose AI only when AI fits the task."
    terms:
      - "rules"
      - "judgment"
      - "repeatability"
      - "variance"
      - "workflow"
    people: "work"
    books: "work"
    official: "https://developers.google.com/machine-learning/crash-course"
    officialLabel: "Google ML Crash Course"
    practice: "List five tasks and label each as better for automation, AI, or human-only judgment."
    steps:
      - "Define automation"
      - "Define AI assistance"
      - "Compare examples"
      - "Find a bad AI use case"
      - "Save a decision rule"
    query: "automation vs artificial intelligence examples"
  responsible-use:
    title: "Responsible Use"
    level: "Work / caution"
    summary: "Responsible use means considering privacy, accuracy, bias, transparency, and accountability before using AI output."
    why: "Most workplace AI failures come from using tools without thinking about data exposure, trust, or consequences."
    goal: "Use AI without blindly trusting it."
    terms:
      - "privacy"
      - "bias"
      - "review"
      - "accountability"
      - "governance"
    people: "governance"
    books: "governance"
    official: "https://www.nist.gov/itl/ai-risk-management-framework"
    officialLabel: "NIST AI RMF"
    practice: "Create a short checklist for when a coworker should not paste data into an AI tool."
    steps:
      - "Identify sensitive data"
      - "Name accuracy risks"
      - "Name bias risks"
      - "Decide review rules"
      - "Save a checklist note"
    query: "responsible AI use at work beginner"
  microsoft-copilot:
    title: "Microsoft Copilot"
    level: "IT / workplace tools"
    summary: "Microsoft Copilot brings generative AI into Microsoft 365 and other Microsoft products, making identity, data access, and tenant boundaries important."
    why: "For IT people, AI is not just a tool; it is a permissions, data, logging, and governance concern."
    goal: "Understand Copilot as an enterprise system, not just a chatbot."
    terms:
      - "tenant"
      - "identity"
      - "permissions"
      - "Microsoft Graph"
      - "data boundary"
    people: "governance"
    books: "work"
    official: "https://learn.microsoft.com/en-us/copilot/"
    officialLabel: "Microsoft Copilot Learn"
    practice: "Map what data a user might expose to Copilot through their existing permissions."
    steps:
      - "Learn what Copilot connects to"
      - "Review identity dependency"
      - "Think through permissions"
      - "List governance questions"
      - "Save IT note"
    query: "Microsoft 365 Copilot data security permissions explained"
  data-privacy:
    title: "Data Privacy"
    level: "IT / governance"
    summary: "Data privacy in AI means controlling what data enters tools, how it is stored, whether it trains models, and who can access outputs."
    why: "AI makes accidental disclosure easier because users can paste, summarize, or retrieve sensitive information through conversational tools."
    goal: "Spot privacy risk before tool adoption."
    terms:
      - "PII"
      - "retention"
      - "training data"
      - "tenant"
      - "access control"
    people: "governance"
    books: "governance"
    official: "https://www.nist.gov/itl/ai-risk-management-framework"
    officialLabel: "NIST AI RMF"
    practice: "Write a plain-language AI data-use rule for employees."
    steps:
      - "Define sensitive data"
      - "Ask where data goes"
      - "Ask whether data trains models"
      - "Define allowed use"
      - "Save policy note"
    query: "AI data privacy enterprise governance beginner"
  identity-access:
    title: "Identity & Access"
    level: "IT / security"
    summary: "Identity and access determine what a user or AI-connected tool can see, retrieve, summarize, or act on."
    why: "AI can amplify existing permission problems. If access is messy, AI search and summarization can surface the mess faster."
    goal: "Connect AI usefulness to least privilege."
    terms:
      - "identity"
      - "least privilege"
      - "RBAC"
      - "tenant"
      - "authorization"
    people: "governance"
    books: "governance"
    official: "https://learn.microsoft.com/en-us/copilot/"
    officialLabel: "Microsoft Copilot Learn"
    practice: "Describe one way poor file permissions could become worse with AI-powered search."
    steps:
      - "Review identity basics"
      - "Connect permissions to AI retrieval"
      - "Name one overexposure risk"
      - "Define one control"
      - "Save security note"
    query: "AI identity access permissions enterprise Copilot security"
  logging-audit:
    title: "Logging & Audit"
    level: "IT / operations"
    summary: "Logging and audit for AI means keeping enough records to understand usage, access, errors, risky prompts, and system behavior."
    why: "AI governance needs evidence. Without logs, teams cannot troubleshoot, investigate, or prove controls are working."
    goal: "Know what should be observable."
    terms:
      - "telemetry"
      - "audit log"
      - "prompt log"
      - "retention"
      - "incident"
    people: "governance"
    books: "governance"
    official: "https://www.nist.gov/itl/ai-risk-management-framework"
    officialLabel: "NIST AI RMF"
    practice: "Draft a minimum logging checklist for an internal AI assistant."
    steps:
      - "List usage events"
      - "List access events"
      - "List failure events"
      - "List privacy concerns"
      - "Save audit note"
    query: "AI logging audit governance enterprise"
  ai-governance:
    title: "AI Governance"
    level: "IT / management"
    summary: "AI governance is the set of policies, controls, roles, and review practices that keep AI use safe, useful, accountable, and aligned with business needs."
    why: "Governance turns AI from scattered experimentation into something an organization can manage."
    goal: "Understand governance as practical control, not paperwork."
    terms:
      - "risk"
      - "policy"
      - "control"
      - "review"
      - "accountability"
    people: "governance"
    books: "governance"
    official: "https://www.nist.gov/itl/ai-risk-management-framework"
    officialLabel: "NIST AI RMF"
    practice: "Create a one-page AI use policy outline with allowed use, restricted data, review rules, and escalation."
    steps:
      - "Define governance"
      - "Read one framework overview"
      - "List risks"
      - "List controls"
      - "Save policy outline"
    query: "AI governance basics NIST framework"
  internal-knowledge:
    title: "Internal Knowledge"
    level: "IT / builder-adjacent"
    summary: "Internal knowledge systems use AI to help people search, summarize, and ask questions over company documents, tickets, procedures, or data."
    why: "This is one of the most practical enterprise AI use cases, but it depends on permissions, source quality, and retrieval design."
    goal: "Understand why internal AI assistants are mostly knowledge architecture problems."
