            termIds: ["data-protection", "access-control", "logging", "compliance", "governance"]
        termIds: ["data-protection", "access-control", "logging", "compliance"]
        resourceIds: ["aws-ai", "azure-ai"]
  exam-terms-review:
    id: "exam-terms-review"
    title: "Exam Terms Review Track"
    provider: "Cross-cert"
    examCode: "Review"
    officialUrl: "https://developers.google.com/machine-learning/glossary"
    blueprintUrl: "https://developers.google.com/machine-learning/glossary"
    lastReviewed: "2026-05-26"
    topicId: "exam-terms"
    summary: "A vocabulary-first review track for terms that show up repeatedly across AI certifications."
    resources:
      - id: "google-glossary"
        label: "Google ML Glossary"
        url: "https://developers.google.com/machine-learning/glossary"
        kind: "official"
    domains:
      - id: "terms-foundation"
        label: "Foundation Vocabulary"
        weightPercent: 40
        summary: "Terms that make foundational AI and ML questions understandable."
        objectives:
          - id: "terms-1-1"
            label: "Define foundation terms"
            summary: "Define AI, ML, model, training, inference, prediction, and evaluation."
            termIds: ["artificial-intelligence", "machine-learning", "training", "inference", "prediction", "model-evaluation"]
        termIds: ["artificial-intelligence", "machine-learning", "training", "inference"]
        resourceIds: ["google-glossary"]
      - id: "terms-genai"
        label: "Generative AI Vocabulary"
        weightPercent: 35
        summary: "Terms that make generative AI and foundation model questions understandable."
        objectives:
          - id: "terms-2-1"
            label: "Define generative terms"
            summary: "Define foundation model, LLM, token, prompt, embedding, RAG, fine-tuning, and hallucination."
            termIds: ["foundation-model", "large-language-model", "token", "prompt-engineering", "embedding", "retrieval-augmented-generation", "fine-tuning", "hallucination"]
        termIds: ["foundation-model", "large-language-model", "token", "prompt-engineering"]
        resourceIds: ["google-glossary"]
      - id: "terms-governance"
        label: "Governance and Security Vocabulary"
        weightPercent: 25
        summary: "Terms that make responsible AI, cloud AI, and SecAI+ questions easier to parse."
        objectives:
          - id: "terms-3-1"
            label: "Define governance and security terms"
            summary: "Define responsible AI, governance, compliance, prompt injection, data poisoning, and human review."
            termIds: ["responsible-ai", "governance", "compliance", "prompt-injection", "data-poisoning", "human-review"]
        termIds: ["responsible-ai", "governance", "compliance", "prompt-injection"]
        resourceIds: ["google-glossary"]
certTerms:
  access-control:
    term: "Access Control"
    definition: "Rules and mechanisms that decide who or what can use a system, dataset, model, API, or function."
    examContext: "Shows up in AI governance, cloud AI, and SecAI+ questions about protecting model and data access."
    relatedTopics: ["identity-access", "data-privacy", "logging-audit"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  accountability:
    term: "Accountability"
    definition: "Clear ownership for AI decisions, risks, approvals, monitoring, and corrective action."
    examContext: "A responsible AI principle that appears across cloud and governance-focused certification questions."
    relatedTopics: ["responsible-ai", "ai-governance"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  adversarial-attack:
    term: "Adversarial Attack"
    definition: "An attempt to manipulate an AI system with inputs, data, prompts, or model behavior that cause unsafe or incorrect output."
    examContext: "Core SecAI+ vocabulary for AI-specific threat scenarios."
    relatedTopics: ["comptia-secai-plus", "agents"]
    sourceUrl: "https://atlas.mitre.org/"
  anomaly-detection:
    term: "Anomaly Detection"
    definition: "Finding patterns or events that differ from expected behavior."
    examContext: "Common AI workload language in Azure and security operations questions."
    relatedTopics: ["azure-ai-fundamentals", "logging-audit"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  api:
    term: "API"
    definition: "A software interface that lets applications call a service or capability in a predictable way."
    examContext: "Cloud AI services are often exposed through APIs, dashboards, and SDKs."
    relatedTopics: ["apis", "cloud-ai-services"]
    sourceUrl: "https://platform.openai.com/docs"
  artificial-intelligence:
    term: "Artificial Intelligence"
    definition: "Software capability that performs tasks involving prediction, pattern recognition, language, perception, planning, or judgment."
    examContext: "The umbrella concept that exam questions separate from ML, generative AI, and normal automation."
    relatedTopics: ["what-is-ai"]
    sourceUrl: "https://developers.google.com/machine-learning/crash-course"
  automation:
    term: "Automation"
    definition: "Using software to perform repeatable tasks, usually with known rules or workflows."
    examContext: "Often contrasted with AI, which handles fuzzier pattern, language, or prediction tasks."
    relatedTopics: ["automation-vs-ai"]
    sourceUrl: "https://developers.google.com/machine-learning/crash-course"
  classification:
    term: "Classification"
    definition: "A machine learning task that predicts which category or class an input belongs to."
    examContext: "Common in foundational ML and Azure AI-900 questions."
    relatedTopics: ["machine-learning"]
    sourceUrl: "https://developers.google.com/machine-learning/glossary"
  clustering:
    term: "Clustering"
    definition: "Grouping similar examples together without predefined labels."
    examContext: "Useful for recognizing unsupervised learning scenarios."
    relatedTopics: ["machine-learning"]
    sourceUrl: "https://developers.google.com/machine-learning/glossary"
  compliance:
    term: "Compliance"
    definition: "Meeting required laws, regulations, policies, or standards."
    examContext: "Appears in SecAI+, responsible AI, and cloud governance questions."
    relatedTopics: ["ai-governance", "data-privacy"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  computer-vision:
    term: "Computer Vision"
    definition: "AI techniques for analyzing images or video, such as object detection, OCR, and image classification."
    examContext: "One of the major Azure AI Fundamentals workload categories."
    relatedTopics: ["azure-ai-fundamentals"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  conversational-ai:
    term: "Conversational AI"
    definition: "AI systems that interact through natural-language dialogue, such as chatbots or assistants."
    examContext: "Appears in Azure NLP and generative AI workload questions."
    relatedTopics: ["llms", "prompting"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  data-poisoning:
    term: "Data Poisoning"
    definition: "An attack that corrupts training, tuning, or retrieval data so an AI system learns or retrieves harmful patterns."
    examContext: "A SecAI+ attack term tied to AI system and data protection."
    relatedTopics: ["comptia-secai-plus", "data-privacy"]
    sourceUrl: "https://atlas.mitre.org/"
  data-protection:
    term: "Data Protection"
    definition: "Controls that keep data private, accurate, available, and only usable by authorized people or systems."
    examContext: "Shows up in all cloud AI and AI security exam paths."
    relatedTopics: ["data-privacy", "identity-access"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  embedding:
    term: "Embedding"
    definition: "A numeric representation of text, images, or other data that helps software compare meaning or similarity."
    examContext: "Key vocabulary for semantic search, RAG, and foundation model application patterns."
    relatedTopics: ["embeddings", "vector-databases", "rag"]
    sourceUrl: "https://developers.google.com/machine-learning/crash-course"
  fairness:
    term: "Fairness"
    definition: "The goal of reducing unjust or harmful differences in how an AI system affects people or groups."
    examContext: "Responsible AI questions often ask how to recognize bias and fairness risk."
    relatedTopics: ["responsible-ai"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  fine-tuning:
    term: "Fine-tuning"
    definition: "Further training a model on targeted data so it adapts to a narrower task, style, or domain."
    examContext: "Often compared with prompt engineering and RAG as a model improvement technique."
    relatedTopics: ["foundation-models", "llms"]
    sourceUrl: "https://developers.google.com/machine-learning/resources/intro-llms"
  foundation-model:
    term: "Foundation Model"
    definition: "A large model trained broadly enough that it can be adapted to many different tasks."
    examContext: "Central vocabulary for AWS AI Practitioner, Azure generative AI, and SecAI+ foundations."
    relatedTopics: ["foundation-models", "llms"]
    sourceUrl: "https://developers.google.com/machine-learning/resources/intro-llms"
  generative-ai:
    term: "Generative AI"
    definition: "AI that creates new text, images, code, audio, or other content from learned patterns."
    examContext: "A major topic in current AI certification outlines."
    relatedTopics: ["generative-ai", "llms"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  governance:
    term: "Governance"
    definition: "The policies, roles, controls, and review processes used to manage AI use and risk."
    examContext: "Appears in responsible AI, AWS security/compliance, cloud AI, and SecAI+ GRC questions."
    relatedTopics: ["ai-governance", "responsible-ai"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  guardrails:
    term: "Guardrails"
    definition: "Rules, filters, controls, and review steps intended to keep AI behavior within acceptable boundaries."
    examContext: "Useful for foundation model and responsible AI questions about safe outputs."
    relatedTopics: ["responsible-ai", "agents"]
    sourceUrl: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
  hallucination:
    term: "Hallucination"
    definition: "An AI output that sounds plausible but is false, unsupported, or fabricated."
    examContext: "Common in generative AI and responsible AI questions about verification."
    relatedTopics: ["hallucinations", "llms"]
    sourceUrl: "https://developers.google.com/machine-learning/resources/intro-llms"
  human-review:
    term: "Human Review"
    definition: "A person checks, approves, or corrects AI output before it is trusted or acted on."
    examContext: "A common control for high-risk AI, security operations, and responsible AI scenarios."
    relatedTopics: ["responsible-use", "ai-governance"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  inference:
    term: "Inference"
    definition: "Using a trained model to produce a prediction, classification, score, or generated output."
    examContext: "One of the fastest ways to separate model training from model use."
    relatedTopics: ["machine-learning", "llms"]
    sourceUrl: "https://developers.google.com/machine-learning/glossary"
  large-language-model:
    term: "Large Language Model"
    definition: "A model trained on large amounts of text that can generate, transform, summarize, and reason over language patterns."
    examContext: "Core generative AI vocabulary for all current AI certification paths."
    relatedTopics: ["llms", "foundation-models"]
    sourceUrl: "https://developers.google.com/machine-learning/resources/intro-llms"
  logging:
    term: "Logging"
    definition: "Recording system activity so actions, errors, access, and decisions can be reviewed later."
    examContext: "Supports monitoring, audit, compliance, and incident response around AI systems."
    relatedTopics: ["logging-audit"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  machine-learning:
    term: "Machine Learning"
    definition: "A way of building systems that learn patterns from data rather than relying only on hand-written rules."
    examContext: "The base layer beneath most AI certification vocabulary."
    relatedTopics: ["machine-learning"]
    sourceUrl: "https://developers.google.com/machine-learning/crash-course"
  managed-service:
    term: "Managed Service"
    definition: "A cloud service where the provider operates much of the infrastructure and maintenance for you."
    examContext: "Cloud AI exams often ask when to use a managed AI service instead of building everything yourself."
    relatedTopics: ["cloud-ai-services"]
    sourceUrl: "https://aws.amazon.com/certification/certified-ai-practitioner/"
  model-evaluation:
    term: "Model Evaluation"
    definition: "Testing model outputs with metrics, examples, reviews, or benchmarks to see whether the model performs well enough."
    examContext: "Shows up in ML fundamentals, foundation model selection, and responsible AI controls."
    relatedTopics: ["machine-learning", "responsible-ai"]
    sourceUrl: "https://developers.google.com/machine-learning/glossary"
  model-evasion:
    term: "Model Evasion"
    definition: "An attempt to craft inputs that avoid detection or cause a model to make the wrong decision."
    examContext: "SecAI+ attack vocabulary for adversarial AI scenarios."
    relatedTopics: ["comptia-secai-plus"]
    sourceUrl: "https://atlas.mitre.org/"
  model-extraction:
    term: "Model Extraction"
    definition: "An attack that attempts to copy, infer, or reconstruct a model or its behavior through access patterns or queries."
    examContext: "SecAI+ vocabulary for threats against proprietary models."
    relatedTopics: ["comptia-secai-plus"]
    sourceUrl: "https://atlas.mitre.org/"
  model-supply-chain:
    term: "Model Supply Chain"
    definition: "The sources, dependencies, datasets, model files, services, and processes involved in building or deploying an AI model."
    examContext: "SecAI+ questions can ask how third-party models, datasets, or packages create risk."
    relatedTopics: ["comptia-secai-plus", "ai-governance"]
    sourceUrl: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
  natural-language-processing:
    term: "Natural Language Processing"
    definition: "AI techniques for working with human language, including text analysis, translation, speech, and chat."
    examContext: "A major Azure AI Fundamentals workload category."
    relatedTopics: ["llms", "azure-ai-fundamentals"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  object-detection:
    term: "Object Detection"
    definition: "A computer vision task that finds and labels objects within an image or video."
    examContext: "Part of Azure computer vision workload vocabulary."
    relatedTopics: ["azure-ai-fundamentals"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  optical-character-recognition:
    term: "Optical Character Recognition"
    definition: "Extracting readable text from images, scanned documents, or photos."
    examContext: "Often appears in Azure vision and document intelligence scenarios."
    relatedTopics: ["azure-ai-fundamentals"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  prediction:
    term: "Prediction"
    definition: "A model output that estimates a future, unknown, or hidden value from patterns in data."
    examContext: "A basic ML term often contrasted with generative output."
    relatedTopics: ["machine-learning"]
    sourceUrl: "https://developers.google.com/machine-learning/crash-course"
  privacy:
    term: "Privacy"
    definition: "Protecting personal or sensitive information from inappropriate collection, exposure, or use."
    examContext: "A responsible AI and cloud AI concern in almost every cert path."
    relatedTopics: ["data-privacy", "responsible-ai"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  prompt-engineering:
    term: "Prompt Engineering"
    definition: "Designing instructions, examples, context, and constraints so a generative AI model produces more useful output."
    examContext: "Compared with RAG and fine-tuning as a practical improvement technique."
    relatedTopics: ["prompting", "prompting-for-work"]
    sourceUrl: "https://platform.openai.com/docs"
  prompt-injection:
    term: "Prompt Injection"
    definition: "An attack that uses instructions in user input, documents, or retrieved content to manipulate a model or AI application."
    examContext: "One of the most important SecAI+ and OWASP LLM security terms."
    relatedTopics: ["comptia-secai-plus", "rag", "agents"]
    sourceUrl: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
  regression:
    term: "Regression"
    definition: "A machine learning task that predicts a numeric value."
    examContext: "Foundational ML vocabulary for Azure and AWS cert questions."
    relatedTopics: ["machine-learning"]
    sourceUrl: "https://developers.google.com/machine-learning/glossary"
  responsible-ai:
    term: "Responsible AI"
    definition: "Designing, using, and governing AI with attention to safety, fairness, privacy, transparency, accountability, and human impact."
    examContext: "A repeated cross-cert concept in AWS, Azure, and SecAI+."
    relatedTopics: ["responsible-ai", "ai-governance"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  retrieval-augmented-generation:
    term: "Retrieval-Augmented Generation"
    definition: "A pattern where an AI system retrieves relevant information and gives it to a model before generating an answer."
    examContext: "Often tested as an alternative to fine-tuning when answers need source grounding."
    relatedTopics: ["rag", "embeddings"]
    sourceUrl: "https://developers.google.com/machine-learning/resources/intro-llms"
  risk-management:
    term: "Risk Management"
    definition: "Identifying, assessing, reducing, and monitoring risks over time."
    examContext: "Important for responsible AI and SecAI+ GRC questions."
    relatedTopics: ["ai-governance", "responsible-ai"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
  secure-deployment:
    term: "Secure Deployment"
    definition: "Releasing an application or model with appropriate identity, network, data, monitoring, and rollback controls."
    examContext: "SecAI+ vocabulary for safely operating AI systems."
    relatedTopics: ["comptia-secai-plus", "logging-audit"]
    sourceUrl: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
  security-operations:
    term: "Security Operations"
    definition: "The people, processes, and tooling used to monitor, detect, investigate, and respond to security events."
    examContext: "SecAI+ includes AI-assisted security operations and SOC workflows."
    relatedTopics: ["comptia-secai-plus"]
    sourceUrl: "https://atlas.mitre.org/"
  sentiment-analysis:
    term: "Sentiment Analysis"
    definition: "A language task that estimates whether text expresses positive, negative, neutral, or mixed sentiment."
    examContext: "Azure NLP workload vocabulary."
    relatedTopics: ["azure-ai-fundamentals", "llms"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  speech:
    term: "Speech"
    definition: "AI workloads that convert speech to text, text to speech, or analyze spoken language."
    examContext: "Appears in Azure NLP and conversational AI scenarios."
    relatedTopics: ["azure-ai-fundamentals"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  threat-intelligence:
    term: "Threat Intelligence"
    definition: "Information about threats, attackers, tactics, indicators, and vulnerabilities used to improve security decisions."
    examContext: "SecAI+ may connect AI to triage, enrichment, and security operations workflows."
    relatedTopics: ["comptia-secai-plus"]
    sourceUrl: "https://atlas.mitre.org/"
  token:
    term: "Token"
    definition: "A piece of text, such as a word part or character sequence, that a language model processes."
    examContext: "Important for understanding LLMs, context windows, prompts, and cost."
    relatedTopics: ["llms", "foundation-models"]
    sourceUrl: "https://developers.google.com/machine-learning/resources/intro-llms"
  training:
    term: "Training"
    definition: "The process of adjusting a model using examples so it learns patterns from data."
    examContext: "A basic concept that exam questions separate from inference and evaluation."
    relatedTopics: ["machine-learning"]
    sourceUrl: "https://developers.google.com/machine-learning/crash-course"
  translation:
    term: "Translation"
    definition: "Converting text or speech from one language to another."
    examContext: "Azure NLP workload vocabulary."
    relatedTopics: ["azure-ai-fundamentals"]
    sourceUrl: "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/ai-900"
  transparency:
    term: "Transparency"
    definition: "Making AI behavior, limits, sources, and decisions understandable enough for appropriate review."
    examContext: "Responsible AI vocabulary for governance, trust, and documentation questions."
    relatedTopics: ["responsible-ai", "ai-governance"]
    sourceUrl: "https://www.nist.gov/itl/ai-risk-management-framework"
