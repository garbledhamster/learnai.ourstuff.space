      - "Pick a knowledge domain"
      - "List source documents"
      - "List access rules"
      - "List answer risks"
      - "Save system sketch"
    query: "internal knowledge base AI assistant RAG enterprise"
  apis:
    title: "APIs"
    level: "Builder / beginner technical"
    summary: "AI APIs let software send prompts, context, files, or structured requests to a model and receive generated output back."
    why: "APIs are the gateway from using AI tools to building AI-powered systems."
    goal: "Understand request, response, model, and cost at a high level."
