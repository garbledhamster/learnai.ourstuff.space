    title: "Azure AI Fundamentals"
    level: "Certification / foundational"
    summary: "Azure AI Fundamentals is Microsoft’s entry AI credential covering AI workloads, ML principles, computer vision, NLP, and generative AI in the Azure context."
    why: "This matters in Microsoft-heavy workplaces where Azure and Microsoft AI services are already part of the environment."
    goal: "Understand Azure AI concepts and exam vocabulary."
    terms:
      - "AI workloads"
      - "Azure AI"
      - "computer vision"
      - "NLP"
      - "generative AI"
    people: "cert"
    books: "cert"
    official: "https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-fundamentals/"
    officialLabel: "Microsoft Certification Page"
    practice: "Review Microsoft’s assessed skills and turn each one into a topic note."
    steps:
      - "Read certification page"
      - "Review assessed skills"
      - "Map terms to topics"
      - "Find weak areas"
      - "Save exam note"
    query: "Microsoft Azure AI Fundamentals AI-900 AI-901 study guide"
  responsible-ai:
    title: "Responsible AI"
    level: "Certification / governance"
    summary: "Responsible AI covers fairness, reliability, privacy, transparency, accountability, and safe use of AI systems."
    why: "Responsible AI appears across certifications, workplace use, IT governance, and public debates."
    goal: "Name the core risks and controls."
    terms:
      - "fairness"
      - "privacy"
      - "transparency"
      - "accountability"
      - "risk"
    people: "governance"
    books: "governance"
    official: "https://www.nist.gov/itl/ai-risk-management-framework"
    officialLabel: "NIST AI RMF"
    practice: "Create a five-point responsible AI checklist for a beginner using AI at work."
    steps:
      - "Define responsible AI"
      - "Read NIST overview"
      - "List common risks"
      - "List controls"
      - "Save checklist note"
    query: "responsible AI explained beginner NIST"
  foundation-models:
    title: "Foundation Models"
    level: "Certification / foundation"
    summary: "Foundation models are large models trained broadly enough that they can be adapted to many downstream tasks."
    why: "This term appears constantly in generative AI, cloud AI, and certification material."
    goal: "Understand how one model can support many uses."
    terms:
      - "pretraining"
      - "fine-tuning"
      - "adaptation"
      - "foundation model"
      - "multimodal"
    people: "llm"
    books: "llm"
    official: "https://developers.google.com/machine-learning/resources/intro-llms"
    officialLabel: "Google Intro to LLMs"
    practice: "Explain how a foundation model differs from a small single-purpose model."
    steps:
      - "Define foundation model"
      - "Connect to LLMs"
      - "Find two use cases"
      - "Name limits"
      - "Save term note"
    query: "foundation models explained beginner"
  cloud-ai-services:
    title: "Cloud AI Services"
    level: "Certification / cloud"
    summary: "Cloud AI services are hosted tools from providers like AWS, Microsoft, and Google that expose AI capabilities through dashboards, APIs, and managed services."
    why: "Certifications often test not just concepts, but how those concepts appear inside a provider ecosystem."
    goal: "Recognize provider services without memorizing everything."
    terms:
      - "managed service"
      - "API"
      - "cloud provider"
      - "model service"
      - "governance"
    people: "cert"
    books: "cert"
    official: "https://aws.amazon.com/certification/certified-ai-practitioner/"
    officialLabel: "AWS AI Practitioner"
    practice: "Pick AWS or Microsoft and list three AI services with one sentence each."
    steps:
      - "Choose provider"
      - "Find AI service list"
      - "Identify purpose"
      - "Connect service to concept"
      - "Save cert note"
    query: "cloud AI services AWS Azure Google beginner"
  exam-terms:
    title: "Exam Terms"
    level: "Certification / review"
    summary: "Exam terms are the repeated vocabulary that shows up across AI certifications: model, training, inference, fairness, responsible AI, prompt, token, and governance."
    why: "Vocabulary is one of the quickest ways to make AI certification material less intimidating."
    goal: "Build a personal glossary."
    terms:
      - "model"
      - "training"
      - "inference"
      - "prompt"
      - "responsible AI"
    people: "cert"
    books: "cert"
    official: "https://developers.google.com/machine-learning/glossary"
